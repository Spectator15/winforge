name: Build WinForge EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install customtkinter pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --noconsole --name WinForge --uac-admin --hidden-import customtkinter --collect-all customtkinter main.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: WinForge-v5
          path: dist/WinForge.exe
